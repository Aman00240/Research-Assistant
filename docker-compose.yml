services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: research_backend
        command:
            [
                "uv",
                "run",
                "uvicorn",
                "backend.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--reload",
            ]
        ports:
            - "8000:8000"
        volumes:
            - .:/app
        env_file:
            - .env

    frontend:
        build:
            context: .
            dockerfile: Dockerfile.frontend
        container_name: research_frontend
        ports:
            - "8501:8501"
        volumes:
            - .:/app
        environment:
            - BACKEND_URL=http://backend:8000
        depends_on:
            - backend
